<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDP性格测试 - 发现你的行为风格</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section id="home-page" class="page active">
            <p class="eyebrow">PDP Personality Test</p>
            <h1>PDP性格测试</h1>
            <p class="lead">通过 30 道题了解你的主要行为风格：老虎型、孔雀型、考拉型、猫头鹰型或变色龙型。</p>

            <div class="types-intro">
                <article class="type-card tiger"><h3>🐯 老虎型</h3><p>目标导向，果断行动</p></article>
                <article class="type-card peacock"><h3>🦚 孔雀型</h3><p>热情表达，善于社交</p></article>
                <article class="type-card koala"><h3>🐨 考拉型</h3><p>温和稳定，重视协作</p></article>
                <article class="type-card owl"><h3>🦉 猫头鹰型</h3><p>严谨分析，关注细节</p></article>
                <article class="type-card chameleon"><h3>🦎 变色龙型</h3><p>灵活适应，善于整合</p></article>
            </div>

            <p class="note">测试约 5-8 分钟，结果仅作自我认知参考。</p>
            <button id="start-btn" class="btn primary-btn">开始测试</button>
        </section>

        <section id="test-page" class="page">
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <p class="progress-text">第 <span id="current-question">1</span>/30 题</p>
            <div id="question-container" class="question-container"></div>
            <div class="navigation">
                <button id="prev-btn" class="btn secondary-btn" disabled>上一题</button>
                <button id="next-btn" class="btn primary-btn">下一题</button>
                <button id="submit-btn" class="btn primary-btn" hidden>查看结果</button>
            </div>
        </section>

        <section id="result-page" class="page">
            <h1>你的测试结果</h1>
            <div class="result-chart"><canvas id="radar-chart"></canvas></div>
            <div id="result-type"></div>
            <div id="result-description"></div>
            <div id="result-details"></div>
            <button id="restart-btn" class="btn primary-btn">重新测试</button>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
