<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试宇宙 - MartinaECC</title>
    <link rel="stylesheet" href="style.css?v=20260504-3">
</head>
<body>
    <main class="container home-shell">
        <section class="landing-hero">
            <p class="eyebrow">MartinaECC Tests</p>
            <h1>测试宇宙</h1>
            <p class="lead">性格、暴富、脑洞和自我探索测试集合。先从一个小测试开始，看看今天的你是哪种隐藏设定。</p>
        </section>

        <section class="test-grid" aria-label="测试列表">
            <article class="test-card pdp-card">
                <div class="card-topline">
                    <span class="test-icon">🧭</span>
                    <span class="status-pill live">已上线</span>
                </div>
                <h2>PDP性格测试</h2>
                <p>通过 30 道题了解你的行为风格：老虎、孔雀、考拉、猫头鹰、变色龙。</p>
                <div class="tag-row">
                    <span>性格识别</span>
                    <span>5-8分钟</span>
                    <span>30题</span>
                </div>
                <a class="btn primary-btn card-action" href="pdp/">开始测试</a>
            </article>

            <article class="test-card bfti-card coming-soon">
                <div class="card-topline">
                    <span class="test-icon">💸</span>
                    <span class="status-pill soon">即将上线</span>
                </div>
                <h2>BFTI暴富TI测试</h2>
                <p>暴富TI测试筹备中。未来会帮你看看自己的暴富人格、财富直觉和搞钱姿势。</p>
                <div class="tag-row">
                    <span>财富人格</span>
                    <span>娱乐测试</span>
                    <span>预留</span>
                </div>
                <a class="btn secondary-btn card-action" href="bfti/">查看预告</a>
            </article>

            <article class="test-card placeholder-card">
                <div class="card-topline">
                    <span class="test-icon">✨</span>
                    <span class="status-pill soon">预留位置</span>
                </div>
                <h2>更多测试</h2>
                <p>这里会继续放新的测试：关系模式、职场风格、消费人格、灵感雷达等。</p>
                <div class="tag-row">
                    <span>待定</span>
                    <span>可扩展</span>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
